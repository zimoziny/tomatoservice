<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>토마토 서비스 | Team Intro</title>
    <meta
      name="description"
      content="토마토 서비스 매거진·굿즈 팀을 소개하는 다크 무드의 심플한 웹사이트"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="tomato-burst" aria-hidden="true">
      <span class="splash core"></span>
      <span class="splash ring"></span>
      <span class="drop d1"></span>
      <span class="drop d2"></span>
      <span class="drop d3"></span>
      <span class="drop d4"></span>
      <span class="drop d5"></span>
    </div>
    <header class="hero">
      <div class="hero-copy">
        <p class="label">MAGAZINE & GOODS TEAM | INSTA @tmto.service</p>
        <h1>TOMATO SERVICE.</h1>
        <p class="hero-description">
          우리는 콘텐츠를 만들고, 감각을 입히고, 팀의 이야기를 굿즈로 확장합니다.
        </p>
      </div>
    </header>

    <main id="members" class="members-wrap">
      <h2 class="members-title">MEMBER</h2>
      <section class="members">
        <section class="team-card accent-red">
          <button class="team-toggle" type="button" aria-expanded="false">Central</button>
          <ul>
            <li><span class="role">총괄</span> 김준아, 이지구</li>
            <li><span class="role">총무</span> 최성빈</li>
            <li><span class="role">기획</span> 정승일, 구경환</li>
          </ul>
        </section>

        <section class="team-card accent-pink">
          <button class="team-toggle" type="button" aria-expanded="false">Editor Team</button>
          <ul>
            <li><span class="role">팀장</span> 김준아</li>
            <li><span class="role">팀원</span> 김재윤, 이성윤</li>
          </ul>
        </section>

        <section class="team-card accent-blue">
          <button class="team-toggle" type="button" aria-expanded="false">Design Team</button>
          <ul>
            <li><span class="role">팀장</span> 염유빈</li>
            <li><span class="role">팀원</span> 안유진, 박준하</li>
          </ul>
        </section>

        <section class="team-card accent-yellow">
          <button class="team-toggle" type="button" aria-expanded="false">Fashion Team</button>
          <ul>
            <li><span class="role">팀장</span> 이영서</li>
            <li><span class="role">팀원</span> 김민아, 김태환, 박지수</li>
          </ul>
        </section>
      </section>
      <div class="action-links">
        <a class="action-btn" href="#" aria-label="굿즈 보러가기">굿즈 보러가기</a>
        <a class="action-btn" href="#" aria-label="매거진 보러가기">매거진 보러가기</a>
      </div>
    </main>

    <footer>
      <p>Tomato Service © <span id="year"></span></p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
